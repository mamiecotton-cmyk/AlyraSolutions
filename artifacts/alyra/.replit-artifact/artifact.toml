kind = "web"
previewPath = "/"
title = "Alyra Solutions - Nail Salon Platform"
version = "1.0.0"
id = "artifacts/alyra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22232
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/alyra run dev"

[services.env]
PORT = "22232"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/alyra", "run", "build"]
publicDir = "artifacts/alyra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
